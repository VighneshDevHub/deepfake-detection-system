<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deepfake Detector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="url(#g1)" stroke-width="2"/>
        <path d="M16.5 16.5L21 21" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M8 11h6M11 8v6" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        <defs>
          <linearGradient id="g1" x1="4" y1="4" x2="20" y2="20" gradientUnits="userSpaceOnUse">
            <stop stop-color="#818cf8"/>
            <stop offset="1" stop-color="#6366f1"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="brand-text">
        <span class="brand-name">Deepfake Detector</span>
        <span class="brand-sub">AI-powered analysis</span>
      </div>
    </div>
    <div class="status-pill" id="status-pill">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-label">Connecting…</span>
    </div>
  </header>

  <!-- ── Tabs ── -->
  <nav class="tabs">
    <button class="tab active" data-tab="detect">Detect</button>
    <button class="tab" data-tab="scan">Page Scan</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>

  <!-- ── Tab: Detect ── -->
  <div class="tab-panel active" id="tab-detect">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" hidden />
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V8m0 0-3 3m3-3 3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3 2"/></svg>
      </div>
      <p class="upload-title" id="upload-title">Drop image or click to browse</p>
      <p class="upload-sub">JPEG · PNG · WebP</p>
    </div>

    <!-- Result card (hidden until result) -->
    <div class="result-card hidden" id="result-card">
      <div class="result-verdict" id="result-verdict"></div>
      <div class="confidence-bar-wrap">
        <div class="confidence-bar-track">
          <div class="confidence-bar-fill" id="conf-bar"></div>
        </div>
        <span class="confidence-pct" id="conf-pct"></span>
      </div>
      <div class="result-meta" id="result-meta"></div>
    </div>

    <div class="error-card hidden" id="error-card"></div>
  </div>

  <!-- ── Tab: Page Scan ── -->
  <div class="tab-panel" id="tab-scan">
    <p class="scan-desc">Scan all images on the current page and overlay detection badges.</p>
    <button class="btn btn-primary" id="btn-scan">
      <svg viewBox="0 0 24 24" fill="none" width="15" height="15"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M16.5 16.5 21 21" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      Scan Page
    </button>
    <div class="scan-status hidden" id="scan-status">
      <div class="spinner"></div>
      <span>Scanning images…</span>
    </div>
    <div class="scan-tip">
      <svg viewBox="0 0 16 16" fill="none" width="12" height="12"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M8 7v5M8 5v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Right-click any image → "Detect Deepfake" for single-image analysis.
    </div>
  </div>

  <!-- ── Tab: Settings ── -->
  <div class="tab-panel" id="tab-settings">
    <div class="field">
      <label for="api-url">API Endpoint</label>
      <input type="text" id="api-url" placeholder="http://localhost:8000" spellcheck="false" />
    </div>
    <div class="field">
      <label for="threshold">
        Detection Threshold
        <span class="threshold-badge" id="threshold-val">0.50</span>
      </label>
      <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.5" />
      <div class="threshold-labels"><span>Sensitive</span><span>Strict</span></div>
    </div>
    <label class="toggle-row">
      <span>Auto-scan on page load</span>
      <div class="toggle">
        <input type="checkbox" id="auto-scan" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </div>
    </label>
    <button class="btn btn-primary" id="btn-save">Save Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
